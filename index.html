<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Expense Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                        serif: ['"DM Serif Display"', 'serif'],
                    },
                    colors: { primary: '#6c47ff' }
                }
            }
        }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { @apply bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-300; }
        .card { @apply bg-white dark:bg-gray-800 border-[0.5px] border-gray-200 dark:border-gray-700 rounded-[14px] p-4 lg:p-6 shadow-sm; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback } = React;

        const CATEGORIES = {
            Food: { color: '#6c47ff', icon: 'utensils' },
            Transport: { color: '#ff6b6b', icon: 'car' },
            Shopping: { color: '#ffb347', icon: 'shopping-bag' },
            Health: { color: '#00d4aa', icon: 'activity' },
            Entertainment: { color: '#ff8cc8', icon: 'film' },
            Bills: { color: '#4fc3f7', icon: 'file-text' },
            Other: { color: '#a0a0c0', icon: 'more-horizontal' },
        };

        const formatINR = (val) => '₹' + Math.round(Number(val)).toLocaleString('en-IN');
        const getMonthId = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, '0')}`;
        const getMonthName = (mId) => new Date(mId.split('-')[0], mId.split('-')[1]-1, 1).toLocaleString('default', { month: 'short', year:'2-digit' });

        // Custom Hook for Local Storage Persistence
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.warn(`Error reading localStorage key "${key}":`, error);
                    return initialValue;
                }
            });

            const setValue = value => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.warn(`Error setting localStorage key "${key}":`, error);
                }
            };
            return [storedValue, setValue];
        }

        const Icon = ({ name, className="w-5 h-5", color="currentColor" }) => {
            const icons = {
                'utensils': <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2M7 2v20M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7" />,
                'car': <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2M7 17v4h2v-4M15 17v4h2v-4M7 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4ZM15 17a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/>,
                'shopping-bag': <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4ZM3 6h18M16 10a4 4 0 0 1-8 0"/>,
                'activity': <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>,
                'film': <><path d="M19.8 2H4.2A2.2 2.2 0 0 0 2 4.2v15.6A2.2 2.2 0 0 0 4.2 22h15.6a2.2 2.2 0 0 0 2.2-2.2V4.2A2.2 2.2 0 0 0 19.8 2Z"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 17h5M17 7h5"/></>,
                'file-text': <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>,
                'more-horizontal': <><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></>,
                'sun': <><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></>,
                'moon': <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>,
                'trash': <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>,
                'upload': <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>,
                'settings': <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                'check-circle': <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
                'alert-circle': <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || icons['more-horizontal']}
                </svg>
            );
        };

        const ToastContainer = ({ toasts }) => (
            <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2">
                {toasts.map(t => (
                    <div key={t.id} className={`flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg transform transition-all animate-slide-up text-sm font-medium ${t.type === 'error' ? 'bg-red-50 dark:bg-red-900 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-200' : 'bg-green-50 dark:bg-green-900 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-200'}`}>
                        <Icon name={t.type === 'error' ? 'alert-circle' : 'check-circle'} className="w-5 h-5"/>
                        {t.message}
                    </div>
                ))}
            </div>
        );

        const CustomChart = ({ config, height="250px" }) => {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);
            useEffect(() => {
                if (chartInstance.current) chartInstance.current.destroy();
                chartInstance.current = new window.Chart(canvasRef.current, config);
                return () => chartInstance.current?.destroy();
            }, [config]);
            return <div className="relative w-full" style={{height}}><canvas ref={canvasRef}></canvas></div>;
        };

        const OverviewTab = ({ transactions, isDark, settings }) => {
            const currentMonthId = getMonthId(new Date());
            const currentTxns = transactions.filter(t => getMonthId(new Date(t.date)) === currentMonthId);
            const currentSpend = currentTxns.reduce((sum, t) => sum + t.amount, 0);
            const remaining = settings.totalBudget - currentSpend;

            const categoryTotal = {};
            currentTxns.forEach(t => categoryTotal[t.category] = (categoryTotal[t.category]||0) + t.amount);
            const topCategory = Object.keys(categoryTotal).reduce((a, b) => categoryTotal[a] > categoryTotal[b] ? a : b, 'None');
            
            const last6Months = [];
            for(let i=5; i>=0; i--) {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                last6Months.push({ mId: getMonthId(d), label: getMonthName(getMonthId(d)) });
            }
            const monthlySpendData = last6Months.map(m => transactions.filter(t => getMonthId(new Date(t.date)) === m.mId).reduce((s,t)=>s+t.amount, 0));

            const comboConfig = {
                type: 'bar',
                data: {
                    labels: last6Months.map(m => m.label),
                    datasets: [
                        { type: 'line', label: 'Budget', data: last6Months.map(()=>settings.totalBudget), borderColor: isDark ? '#6b7280' : '#9ca3af', borderWidth: 2, borderDash: [5,5], fill: false, pointRadius: 0, tension: 0.1 },
                        { type: 'bar', label: 'Spend', data: monthlySpendData, backgroundColor: '#6c47ff', borderRadius: 4, barThickness: 30 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#374151' : '#e5e7eb' }, ticks: { color: isDark ? '#9ca3af' : '#6b7280' } },
                        x: { grid: { display: false }, ticks: { color: isDark ? '#9ca3af' : '#6b7280' } } 
                    }
                }
            };

            const donutLabels = Object.keys(categoryTotal);
            const donutConfig = {
                type: 'doughnut',
                data: {
                    labels: donutLabels,
                    datasets: [{ data: donutLabels.map(l => categoryTotal[l]), backgroundColor: donutLabels.map(l => CATEGORIES[l]?.color), borderWidth: 0 }]
                },
                options: { responsive: true, maintainAspectRatio: false, cutout: '75%', plugins: { legend: { display: false } } }
            };

            const insights = [];
            const prevMonthSpend = monthlySpendData[4] || 0;
            if (prevMonthSpend > 0) {
                insights.push(currentSpend > prevMonthSpend ? `Your spending is trending ${formatINR(currentSpend - prevMonthSpend)} higher than last month.` : `Great job! You've spent ${formatINR(prevMonthSpend - currentSpend)} less than last month so far.`);
            }
            if (topCategory !== 'None') insights.push(`Your highest expense category is ${topCategory} at ${formatINR(categoryTotal[topCategory])}.`);
            insights.push(currentSpend > settings.totalBudget ? "You have exceeded your total monthly budget!" : `You are pacing well with ${formatINR(remaining)} left in your budget.`);

            // Dynamically calculate budget limits based on overall budget percentage allocation if desired, but we will leave limits strictly as per CATEGORIES array.
            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[ 
                            { l: 'Total Spend', v: formatINR(currentSpend), c: 'text-gray-900 dark:text-gray-100' },
                            { l: 'Remaining Budget', v: formatINR(remaining), c: remaining < 0 ? 'text-red-500' : 'text-[#00d4aa]' },
                            { l: 'Top Category', v: topCategory, c: 'text-gray-900 dark:text-gray-100' },
                            { l: 'Transactions', v: currentTxns.length, c: 'text-gray-900 dark:text-gray-100' }
                        ].map(k => (
                            <div key={k.l} className="bg-gray-50 dark:bg-gray-800/60 border border-gray-100 dark:border-gray-700/50 rounded-[14px] p-4 flex flex-col justify-center">
                                <div className="text-[11px] uppercase tracking-wider text-gray-500 dark:text-gray-400 font-medium mb-1">{k.l}</div>
                                <div className={`text-[22px] font-bold font-serif ${k.c}`}>{k.v}</div>
                            </div>
                        ))}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="card lg:col-span-2">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-serif text-lg">Spending Trend</h3>
                                <div className="flex gap-4 text-sm font-medium text-gray-600 dark:text-gray-300">
                                    <span className="flex items-center gap-1"><span className="w-3 h-3 bg-primary rounded-sm"></span> Spend</span>
                                    <span className="flex items-center gap-2 text-gray-400">--- Budget</span>
                                </div>
                            </div>
                            <CustomChart config={comboConfig} height="240px" />
                        </div>
                        <div className="card flex flex-col">
                            <h3 className="font-serif text-lg mb-4">Category Breakdown</h3>
                            {donutLabels.length > 0 ? (
                                <div className="flex-1 flex flex-col justify-center relative">
                                    <CustomChart config={donutConfig} height="200px" />
                                    <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none mt-2">
                                        <span className="text-gray-500 text-xs uppercase tracking-wide">Total</span>
                                        <span className="font-serif text-xl font-bold">{formatINR(currentSpend)}</span>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 flex items-center justify-center text-gray-500 text-sm">No expenses this month</div>
                            )}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="card">
                            <h3 className="font-serif text-lg mb-4">Category Budgets</h3>
                            <div className="space-y-4">
                                {Object.keys(CATEGORIES).map(cat => {
                                    const spend = categoryTotal[cat] || 0;
                                    const categoryBudgetPct = { Food: 0.27, Transport: 0.1, Shopping: 0.2, Health: 0.07, Entertainment: 0.1, Bills: 0.17, Other: 0.09 };
                                    const budget = settings.totalBudget * (categoryBudgetPct[cat] || 0.1);
                                    
                                    const isOver = spend > budget;
                                    const pct = Math.min(100, (spend / budget) * 100);
                                    return (
                                        <div key={cat} className="text-sm">
                                            <div className="flex justify-between items-center mb-1.5">
                                                <span className="font-medium flex items-center gap-2">
                                                    <Icon name={CATEGORIES[cat].icon} color={CATEGORIES[cat].color} className="w-4 h-4"/>{cat}
                                                </span>
                                                <span className="flex items-center gap-2">
                                                    <span className="font-bold">{formatINR(spend)}</span>
                                                    <span className={`text-[10px] uppercase font-bold px-1.5 py-0.5 rounded ${isOver ? 'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-400' : 'bg-green-100 text-green-700 dark:bg-[#00d4aa]/20 dark:text-[#00d4aa]'}`}>
                                                        {isOver ? `Over ${formatINR(spend - budget)}` : `Under ${formatINR(budget - spend)}`}
                                                    </span>
                                                </span>
                                            </div>
                                            <div className="w-full h-2 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                                                <div className="h-full rounded-full transition-all duration-500" style={{ width: `${pct}%`, backgroundColor: isOver ? '#ff6b6b' : CATEGORIES[cat].color }}></div>
                                            </div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>

                        <div className="flex flex-col gap-6">
                            <div className="card">
                                <h3 className="font-serif text-lg mb-4">Recent Transactions</h3>
                                <div className="space-y-3">
                                    {transactions.sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6).map(t => (
                                        <div key={t.id} className="flex justify-between items-center p-2 hover:bg-gray-50 dark:hover:bg-gray-700/30 rounded-lg transition-colors">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-gray-700" style={{color: CATEGORIES[t.category]?.color||'#000'}}>
                                                    <Icon name={CATEGORIES[t.category]?.icon||'more-horizontal'} className="w-5 h-5" />
                                                </div>
                                                <div>
                                                    <div className="font-medium text-sm">{t.desc}</div>
                                                    <div className="text-xs text-gray-500">{t.date}</div>
                                                </div>
                                            </div>
                                            <div className="font-bold text-sm bg-gray-50 dark:bg-gray-800 px-2 py-1 rounded border border-gray-100 dark:border-gray-700">{formatINR(t.amount)}</div>
                                        </div>
                                    ))}
                                    {transactions.length === 0 && (
                                        <div className="p-4 text-center text-gray-500 text-sm">No recent transactions.</div>
                                    )}
                                </div>
                            </div>

                            <div className="card relative overflow-hidden bg-gradient-to-br from-[#6c47ff]/5 to-[#00d4aa]/5 dark:from-[#6c47ff]/10 dark:to-[#00d4aa]/10">
                                <div className="absolute top-0 left-0 w-1 h-full bg-[#00d4aa]"></div>
                                <h3 className="font-serif text-lg mb-3 flex items-center gap-2">
                                    <Icon name="sun" color="#00d4aa" /> Smart Insights
                                </h3>
                                <ul className="space-y-2 text-sm text-gray-700 dark:text-gray-300">
                                    {insights.length > 0 ? insights.map((i, idx) => <li key={idx} className="flex gap-2"><span className="text-[#00d4aa]">•</span> {i}</li>) : <li className="text-gray-500">Not enough data to calculate insights. Add some expenses first.</li>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AddExpenseTab = ({ transactions, setTransactions, addToast }) => {
            const [newTxn, setNewTxn] = useState({ amount: '', date: new Date().toISOString().split('T')[0], desc: '', category: 'Food' });

            const handleManual = (e) => {
                e.preventDefault();
                if(!newTxn.amount || !newTxn.desc) { addToast('Please fill all fields', 'error'); return; }
                setTransactions([{ id: Date.now(), amount: parseFloat(newTxn.amount), date: newTxn.date, desc: newTxn.desc, category: newTxn.category }, ...transactions]);
                setNewTxn({...newTxn, amount: '', desc: ''});
                addToast('Transaction added successfully!');
            };

            const handleCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (evt) => {
                    try {
                        const lines = evt.target.result.split('\n').filter(l => l.trim().length > 0);
                        if (lines.length < 2) throw new Error("File empty or missing data rows.");
                        
                        const acc = [];
                        for(let i=1; i<lines.length; i++) {
                            const c = lines[i].split(',');
                            if(c.length >= 4) {
                                acc.push({ id: Date.now()+i, date: c[0].trim(), desc: c[1].trim(), amount: parseFloat(c[2].trim())||0, category: c[3].trim()||'Other' });
                            }
                        }
                        setTransactions([...acc, ...transactions]);
                        addToast(`Successfully imported ${acc.length} transactions via CSV!`);
                    } catch(err) {
                        addToast(`CSV Error: ${err.message}`, 'error');
                    }
                };
                r.readAsText(file);
                e.target.value = null; // reset input
            };

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="card">
                            <h3 className="font-serif text-xl mb-4">Manual Entry</h3>
                            <form onSubmit={handleManual} className="space-y-4">
                                <div>
                                    <label className="block text-sm mb-1 text-gray-500 font-medium">Amount</label>
                                    <input type="number" step="0.01" required value={newTxn.amount} onChange={e=>setNewTxn({...newTxn, amount: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition" placeholder="₹0"/>
                                </div>
                                <div>
                                    <label className="block text-sm mb-1 text-gray-500 font-medium">Date</label>
                                    <input type="date" required value={newTxn.date} onChange={e=>setNewTxn({...newTxn, date: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition"/>
                                </div>
                                <div>
                                    <label className="block text-sm mb-1 text-gray-500 font-medium">Description</label>
                                    <input type="text" required value={newTxn.desc} onChange={e=>setNewTxn({...newTxn, desc: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition" placeholder="E.g. Groceries"/>
                                </div>
                                <div>
                                    <label className="block text-sm mb-1 text-gray-500 font-medium">Category</label>
                                    <select required value={newTxn.category} onChange={e=>setNewTxn({...newTxn, category: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition">
                                        {Object.keys(CATEGORIES).map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <button className="w-full py-3 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition shadow-md">Add Transaction</button>
                            </form>
                        </div>

                        <div className="card text-center flex flex-col items-center justify-center border-dashed border-2 bg-gray-50/50 dark:bg-gray-800/50">
                            <div className="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4"><Icon name="upload" color="#6c47ff" className="w-8 h-8"/></div>
                            <h3 className="font-serif text-xl mb-2">CSV Upload</h3>
                            <p className="text-sm text-gray-500 mb-6">Format: date, description, amount, category<br/>Headers on first row.</p>
                            <label className="cursor-pointer px-6 py-2.5 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg font-medium hover:bg-gray-50 dark:hover:bg-gray-600 transition shadow-sm">
                                Browse File
                                <input type="file" accept=".csv" className="hidden" onChange={handleCSV}/>
                            </label>
                        </div>
                    </div>

                    <div className="card">
                        <h3 className="font-serif text-xl mb-4">Transaction History</h3>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm border-collapse">
                                <thead>
                                    <tr className="border-b border-gray-200 dark:border-gray-700 text-gray-500 uppercase">
                                        <th className="p-3 font-medium">Date</th>
                                        <th className="p-3 font-medium">Description</th>
                                        <th className="p-3 font-medium">Category</th>
                                        <th className="p-3 font-medium text-right">Amount</th>
                                        <th className="p-3 font-medium text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {transactions.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t => (
                                        <tr key={t.id} className="border-b border-gray-100 dark:border-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition">
                                            <td className="p-3 font-medium">{t.date}</td>
                                            <td className="p-3 text-gray-600 dark:text-gray-300">{t.desc}</td>
                                            <td className="p-3">
                                                <span className="inline-flex items-center gap-1.5 px-2 py-1 rounded bg-gray-100 dark:bg-gray-900 border border-gray-200 dark:border-gray-700">
                                                    <span className="w-2 h-2 rounded-full" style={{backgroundColor: CATEGORIES[t.category]?.color||'#000'}}></span> {t.category}
                                                </span>
                                            </td>
                                            <td className="p-3 text-right font-bold text-gray-900 dark:text-white">{formatINR(t.amount)}</td>
                                            <td className="p-3 text-center">
                                                <button onClick={()=>{
                                                    setTransactions(transactions.filter(x=>x.id!==t.id));
                                                    addToast('Transaction removed.');
                                                }} className="text-gray-400 hover:text-red-500 transition p-2"><Icon name="trash" className="w-4 h-4 mx-auto"/></button>
                                            </td>
                                        </tr>
                                    ))}
                                    {transactions.length===0 && <tr><td colSpan="5" className="p-8 text-center text-gray-500">No transactions found. Add some to get started.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const GoalsTab = ({ transactions, goals, setGoals, settings, addToast }) => {
            const [newGoal, setNewGoal] = useState({ name: '', target: '' });
            
            const currentMonthId = getMonthId(new Date());
            const currentTxns = transactions.filter(t => getMonthId(new Date(t.date)) === currentMonthId);
            const categorySpend = {};
            currentTxns.forEach(t => categorySpend[t.category] = (categorySpend[t.category]||0) + t.amount);

            return (
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="card flex flex-col">
                        <h3 className="font-serif text-xl mb-6">Savings Goals</h3>
                        <div className="space-y-6 flex-1">
                            {goals.map(g => {
                                const pct = (g.saved / g.target) * 100;
                                return (
                                    <div key={g.id} className="relative group">
                                        <button onClick={()=>{
                                            setGoals(goals.filter(x=>x.id!==g.id));
                                            addToast('Goal deleted.');
                                        }} className="absolute -top-2 -right-2 bg-gray-100 dark:bg-gray-700 p-1 rounded-full text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                            <Icon name="trash" className="w-3 h-3"/>
                                        </button>
                                        <div className="flex justify-between items-end mb-2">
                                            <div>
                                                <h4 className="font-medium text-lg text-gray-900 dark:text-white pr-4">{g.name}</h4>
                                                <div className="text-xs text-gray-500 mt-1 uppercase tracking-wide">Saved {formatINR(g.saved)} of {formatINR(g.target)}</div>
                                            </div>
                                            <div className="text-sm font-bold text-[#00d4aa] bg-[#00d4aa]/10 px-2.5 py-1 rounded">
                                                {formatINR(g.target - g.saved)} left
                                            </div>
                                        </div>
                                        <div className="w-full h-3 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden cursor-pointer" onClick={()=>{
                                            const addAmt = prompt(`Add savings to ${g.name}:`, "1000");
                                            if(addAmt && !isNaN(addAmt)) {
                                                setGoals(goals.map(x => x.id === g.id ? {...x, saved: Math.min(x.target, x.saved + parseFloat(addAmt))} : x));
                                                addToast(`Added ${formatINR(addAmt)} to goal ${g.name}`);
                                            }
                                        }}>
                                            <div className="h-full bg-gradient-to-r from-primary to-[#00d4aa] rounded-full transition-all duration-1000" style={{ width: `${Math.min(100, pct)}%`}}></div>
                                        </div>
                                    </div>
                                );
                            })}
                            {goals.length === 0 && <div className="text-center p-8 text-gray-500 text-sm">No active goals. Add one below.</div>}
                        </div>
                        <form className="mt-8 border-t border-gray-100 dark:border-gray-700 pt-6" onSubmit={e=>{
                            e.preventDefault(); 
                            setGoals([...goals, { id: Date.now(), name: newGoal.name, target: parseFloat(newGoal.target), saved: 0 }]); 
                            setNewGoal({name:'',target:''});
                            addToast("New goal added successfully!");
                        }}>
                            <h4 className="font-medium mb-3 text-sm text-gray-600 dark:text-gray-400">Add New Goal</h4>
                            <div className="flex gap-2">
                                <input type="text" placeholder="Name" required value={newGoal.name} onChange={e=>setNewGoal({...newGoal, name: e.target.value})} className="flex-1 p-2 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-lg outline-none focus:border-primary text-sm"/>
                                <input type="number" placeholder="Target" required value={newGoal.target} onChange={e=>setNewGoal({...newGoal, target: e.target.value})} className="w-32 p-2 border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 rounded-lg outline-none focus:border-primary text-sm"/>
                                <button className="px-5 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-lg hover:opacity-90 transition font-medium text-sm">Add</button>
                            </div>
                        </form>
                    </div>

                    <div className="card">
                        <h3 className="font-serif text-xl mb-6">Per-Category Gauges</h3>
                        <div className="space-y-5">
                            {Object.keys(CATEGORIES).map(cat => {
                                const spend = categorySpend[cat] || 0;
                                const categoryBudgetPct = { Food: 0.27, Transport: 0.1, Shopping: 0.2, Health: 0.07, Entertainment: 0.1, Bills: 0.17, Other: 0.09 };
                                const limit = settings.totalBudget * (categoryBudgetPct[cat] || 0.1);
                                
                                const pct = (spend / limit) * 100;
                                let color = "#00d4aa"; // green
                                if (pct >= 80) color = "#ffb347"; // amber
                                if (pct > 100) color = "#ff6b6b"; // red
                                return (
                                    <div key={cat}>
                                        <div className="flex justify-between items-center mb-1.5 text-sm">
                                            <span className="font-medium text-gray-700 dark:text-gray-200">{cat}</span>
                                            <span className="font-mono text-xs text-gray-500 leading-none"><span className={pct>100?'text-[#ff6b6b] font-bold':''}>{formatINR(spend)}</span> / {formatINR(limit)}</span>
                                        </div>
                                        <div className="w-full h-2.5 bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden">
                                            <div className="h-full rounded-full transition-all duration-1000 origin-left" style={{ width: `${Math.min(100, pct)}%`, backgroundColor: color }}></div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const ForecastTab = ({ transactions, isDark, settings }) => {
            const last6Months = [];
            for(let i=5; i>=0; i--) { const d = new Date(); d.setMonth(d.getMonth() - i); last6Months.push({ mId: getMonthId(d), label: getMonthName(getMonthId(d)) }); }
            const actualSpend = last6Months.map(m => transactions.filter(t => getMonthId(new Date(t.date)) === m.mId).reduce((s,t)=>s+t.amount, 0));
            const avgSpend = actualSpend.length ? actualSpend.reduce((a,b)=>a+b,0) / actualSpend.length : 0;
            
            const next6Months = [];
            const projectedSpend = [];
            let currentProj = avgSpend;
            for(let i=1; i<=6; i++) {
                const d = new Date(); d.setMonth(d.getMonth() + i);
                next6Months.push(getMonthName(getMonthId(d)));
                currentProj *= 1.02; // 2% growth per month assumption
                projectedSpend.push(currentProj);
            }

            const labels = [...last6Months.map(m=>m.label), ...next6Months];
            const actualData = [...actualSpend, null, null, null, null, null, null];
            const projData = [null, null, null, null, null, actualSpend[5], ...projectedSpend]; 

            const savingRate = ((settings.monthlyIncome - avgSpend) / settings.monthlyIncome) * 100;

            const config = {
                type: 'line',
                data: {
                    labels,
                    datasets: [
                        { label: 'Actual', data: actualData, borderColor: '#6c47ff', backgroundColor: '#6c47ff', fill: false, tension: 0.3, borderWidth: 3, pointBackgroundColor: '#fff', pointBorderWidth: 2, pointRadius: 4 },
                        { label: 'Projected', data: projData, borderColor: '#00d4aa', borderDash: [6, 4], fill: false, tension: 0.3, borderWidth: 3, pointRadius: 0 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: isDark ? '#374151' : '#e5e7eb' }, ticks: { color: isDark ? '#9ca3af' : '#6b7280' } },
                        x: { grid: { display: false }, ticks: { color: isDark ? '#9ca3af' : '#6b7280' } } 
                    }
                }
            };

            return (
                <div className="space-y-6">
                    <div className="card">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-serif text-xl">12-Month Projection</h3>
                            <div className="flex gap-4 text-sm font-medium text-gray-600 dark:text-gray-300">
                                <span className="flex items-center gap-2"><span className="w-3 h-1 bg-[#6c47ff] rounded-full"></span> Actual</span>
                                <span className="flex items-center gap-2 text-[#00d4aa]">--- Projected</span>
                            </div>
                        </div>
                        <CustomChart config={config} height="320px" />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="card flex flex-col justify-center text-center py-8">
                            <div className="text-xs uppercase tracking-widest text-gray-500 dark:text-gray-400 mb-2 font-medium">Monthly Income Config</div>
                            <div className="text-3xl font-serif text-gray-900 dark:text-white">{formatINR(settings.monthlyIncome)}</div>
                        </div>
                        <div className="card flex flex-col justify-center text-center py-8 relative overflow-hidden group">
                            <div className="absolute inset-0 bg-[#00d4aa]/5 transition-colors group-hover:bg-[#00d4aa]/10"></div>
                            <div className="relative z-10">
                                <div className="text-xs uppercase tracking-widest text-gray-500 border-[#00d4aa] mb-2 font-medium">Avg Saving Rate</div>
                                <div className="text-3xl font-serif text-[#00d4aa]">{Math.max(0, savingRate).toFixed(1)}%</div>
                            </div>
                        </div>
                        <div className="bg-gradient-to-br from-[#6c47ff] to-[#5135cc] rounded-[14px] p-6 shadow-lg flex flex-col justify-center text-center text-white relative overflow-hidden">
                            <div className="absolute top-0 right-0 p-4 opacity-20"><Icon name="activity" className="w-24 h-24"/></div>
                            <div className="relative z-10">
                                <div className="text-xs uppercase tracking-widest text-white/80 mb-2 font-medium">Recommended Save (20%)</div>
                                <div className="text-3xl font-serif">{formatINR(settings.monthlyIncome * 0.20)}</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsTab = ({ settings, setSettings, setTransactions, setGoals, addToast }) => {
            const [localSettings, setLocalSettings] = useState(settings);

            const handleSave = (e) => {
                e.preventDefault();
                setSettings({ totalBudget: parseFloat(localSettings.totalBudget), monthlyIncome: parseFloat(localSettings.monthlyIncome) });
                addToast("Settings successfully saved!");
            };

            const handleReset = () => {
                if(window.confirm("Are you sure you want to completely erase all your transactions and goals? This action cannot be undone.")) {
                    setTransactions([]);
                    setGoals([]);
                    addToast("All database entries wiped.", 'error');
                }
            };

            return (
                <div className="max-w-xl space-y-6">
                    <div className="card">
                        <h3 className="font-serif text-xl mb-4">Financial Configuration</h3>
                        <form onSubmit={handleSave} className="space-y-4">
                            <div>
                                <label className="block text-sm mb-1 text-gray-500 font-medium">Monthly Income Assumption</label>
                                <input type="number" required value={localSettings.monthlyIncome} onChange={e=>setLocalSettings({...localSettings, monthlyIncome: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition" />
                                <p className="text-xs text-gray-400 mt-1">Used to calculate your projected saving rates and recommended target.</p>
                            </div>
                            <div>
                                <label className="block text-sm mb-1 text-gray-500 font-medium">Total Monthly Budget</label>
                                <input type="number" required value={localSettings.totalBudget} onChange={e=>setLocalSettings({...localSettings, totalBudget: e.target.value})} className="w-full p-2.5 bg-gray-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 rounded-lg outline-none focus:border-primary transition" />
                                <p className="text-xs text-gray-400 mt-1">This drives the main dashboard gauges and category limits.</p>
                            </div>
                            <button className="py-2.5 px-6 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition shadow-md">Save Settings</button>
                        </form>
                    </div>

                    <div className="card border-red-200 dark:border-red-900/50 bg-red-50/20 dark:bg-red-900/10">
                        <h3 className="font-serif text-xl mb-4 text-red-600 dark:text-red-400">Danger Zone</h3>
                        <p className="text-sm text-gray-600 dark:text-gray-400 mb-4">This will permanently delete all your manually entered transactions and savings goals.</p>
                        <button onClick={handleReset} className="py-2.5 px-6 bg-red-100 text-red-600 dark:bg-red-900/40 dark:text-red-400 rounded-lg font-medium hover:bg-red-200 dark:hover:bg-red-900/60 transition">
                            Reset Database
                        </button>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useLocalStorage('findash_tab', 'Overview');
            const [isDark, setIsDark] = useLocalStorage('findash_theme', false);
            const [transactions, setTransactions] = useLocalStorage('findash_txns', []);
            const [goals, setGoals] = useLocalStorage('findash_goals', []);
            const [settings, setSettings] = useLocalStorage('findash_cfg', { totalBudget: 29000, monthlyIncome: 45000 });
            
            const [toasts, setToasts] = useState([]);

            const addToast = useCallback((message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            }, []);

            useEffect(() => { 
                if (isDark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDark]);

            const tabs = [
                { id: 'Overview', icon: 'activity' },
                { id: 'Add Expense', icon: 'file-text' },
                { id: 'Goals', icon: 'sun' },
                { id: 'Forecast', icon: 'film' },
                { id: 'Settings', icon: 'settings' },
            ];

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <ToastContainer toasts={toasts} />
                    
                    {/* Sidebar */}
                    <aside className="w-full md:w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex-shrink-0 flex flex-col shadow-sm md:shadow-none relative z-20">
                        <div className="p-6 flex justify-between items-center md:block">
                            <h1 className="font-serif text-2xl font-bold text-primary flex items-center gap-2">
                                <div className="w-8 h-8 rounded-lg bg-primary/10 flex items-center justify-center">
                                    <Icon name="activity" color="#6c47ff" />
                                </div>
                                FinDash.
                            </h1>
                            <button onClick={()=>setIsDark(!isDark)} className="md:hidden p-2 text-gray-500 bg-gray-50 dark:bg-gray-700 rounded-full">
                                <Icon name={isDark ? "sun" : "moon"}/>
                            </button>
                        </div>
                        
                        <nav className="flex md:flex-col gap-1 px-4 pb-4 md:pb-0 md:px-3 overflow-x-auto no-scrollbar pt-2">
                            {tabs.map(tab => (
                                <button key={tab.id} onClick={() => setActiveTab(tab.id)} 
                                    className={`px-4 py-3 md:py-3.5 rounded-xl text-left whitespace-nowrap font-medium transition-all duration-200 flex items-center gap-3 text-sm md:text-base cursor-pointer ${
                                        activeTab === tab.id 
                                        ? 'bg-primary text-white shadow-md shadow-primary/20' 
                                        : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 hover:text-gray-900 dark:hover:text-gray-200'
                                    }`}>
                                    <Icon name={tab.icon} className="w-5 h-5"/>
                                    {tab.id}
                                </button>
                            ))}
                        </nav>
                        
                        <div className="mt-auto hidden md:flex p-6">
                            <button onClick={()=>setIsDark(!isDark)} className="flex items-center gap-3 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition w-full p-2 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                <Icon name={isDark ? "sun" : "moon"} /> {isDark ? 'Light Mode' : 'Dark Mode'}
                            </button>
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 p-4 md:p-8 overflow-y-auto h-[calc(100vh-80px)] md:h-screen w-full relative z-10">
                        <div className="max-w-6xl mx-auto pb-20 md:pb-0">
                            <header className="mb-8 mt-2 md:mt-0 flex justify-between items-end">
                                <div>
                                    <h2 className="text-2xl md:text-3xl font-serif font-bold text-gray-900 dark:text-white">{activeTab}</h2>
                                    <p className="text-gray-500 dark:text-gray-400 text-sm mt-1">{
                                        activeTab === 'Overview' ? 'Your financial summary at a glance.' :
                                        activeTab === 'Add Expense' ? 'Track your recent spendings securely.' :
                                        activeTab === 'Goals' ? 'Manage your savings and budget strictly.' :
                                        activeTab === 'Settings' ? 'Dashboard configuration and preferences.' :
                                        'Data-driven insights for your future.'
                                    }</p>
                                </div>
                            </header>

                            <div className="animate-fade-in">
                                {activeTab === 'Overview' && <OverviewTab transactions={transactions} isDark={isDark} settings={settings}/>}
                                {activeTab === 'Add Expense' && <AddExpenseTab transactions={transactions} setTransactions={setTransactions} addToast={addToast}/>}
                                {activeTab === 'Goals' && <GoalsTab transactions={transactions} goals={goals} setGoals={setGoals} settings={settings} addToast={addToast}/>}
                                {activeTab === 'Forecast' && <ForecastTab transactions={transactions} isDark={isDark} settings={settings}/>}
                                {activeTab === 'Settings' && <SettingsTab settings={settings} setSettings={setSettings} setTransactions={setTransactions} setGoals={setGoals} addToast={addToast}/>}
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</body>
</html>
